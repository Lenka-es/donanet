site_name: DonaNet
site_description: WildINTEL YOLO training, evaluation and inference CLI
site_url: https://wildintelproject.github.io/donanet/
copyright: Copyright &copy; 2026 <a href="https://wildintel.eu/">WildINTEL</a>

theme:
  name: material
  language: en
  logo: img/WildINTEL_onlyCircle_25.png
  favicon: img/WildINTEL_onlyCircle_25.png

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

# ── Versionado con mike ───────────────────────────────────────────────────────
extra:
  version:
    provider: mike
    default: latest

extra_css:
  - stylesheets/extras.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Home: index.md
  - DonaNet Model: donanet-model.md
  - Installation Guide: installation-guide.md
  - User Guide: user-guide.md
  - Administrator Guide: admin-guide.md
